<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Tasks</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2A3A4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Tasks">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root {
  --bg:#B8C8D8; --surface:#909090; --surface2:#808080; --surface3:#989898;
  --border:#707880; --border-light:#8090A0;
  --text:#1A1916; --text-muted:#2A2A2A; --text-faint:#4A4A4A;
  --green-bg:#E8F4E8; --green-text:#2D6A2D; --green-border:#B8D9B8;
  --amber-bg:#FEF3E2; --amber-text:#92570A; --amber-border:#F5D08A;
  --blue-bg:#A8C0D8; --blue-text:#185FA5; --blue-border:#85B7EB;
  --red-bg:#8B1A1A; --red-text:#fff; --red-border:#6B1111;
  --topbar-bg:#2A3A4A;
  --accent-done:#185FA5; --accent-streak:#8B1A1A;
}
body.dark {
  --bg:#141414; --surface:#1E1E1E; --surface2:#272727; --surface3:#313131;
  --border:#3A3A3A; --border-light:#2E2E2E;
  --text:#F0EDE8; --text-muted:#9A9690; --text-faint:#5E5C58;
  --green-bg:#162416; --green-text:#6DBF6D; --green-border:#2A4A2A;
  --amber-bg:#231A08; --amber-text:#D4900A; --amber-border:#4A3510;
  --blue-bg:#0C2A3A; --blue-text:#85B7EB; --blue-border:#185FA5;
  --red-bg:#6B1111; --red-text:#fff; --red-border:#4A0A0A;
  --topbar-bg:#0E0E0E;
  --accent-done:#85B7EB; --accent-streak:#E05555;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── Topbar ── */
.topbar{background:var(--topbar-bg);color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:center;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px;}
.topbar-inner{display:flex;align-items:center;gap:8px;width:100%;max-width:620px;flex-wrap:wrap;}
.topbar-title{font-size:15px;font-weight:600;flex-shrink:0;}
.topbar-title span{font-family:'DM Mono',monospace;font-size:11px;font-weight:400;opacity:.45;margin-left:6px;}
.tb-search{font-family:'DM Sans',sans-serif;font-size:13px;padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;outline:none;width:140px;transition:border-color .15s,background .15s;}
.tb-search::placeholder{color:rgba(255,255,255,.38);}
.tb-search:focus{border-color:rgba(255,255,255,.45);background:rgba(255,255,255,.15);}
.tb-gap{flex:1;}
.date-nav{display:flex;align-items:center;gap:5px;}
.nav-btn{font-size:15px;padding:4px 9px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.7);cursor:pointer;transition:all .15s;}
.nav-btn:hover{background:rgba(255,255,255,.15);color:#fff;}
.date-pill{font-family:'DM Mono',monospace;font-size:12px;color:rgba(255,255,255,.85);min-width:88px;text-align:center;}
.tb-btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.22);background:transparent;color:rgba(255,255,255,.7);cursor:pointer;transition:all .15s;white-space:nowrap;}
.tb-btn:hover{background:rgba(255,255,255,.15);color:#fff;}
.tb-btn.active{background:rgba(255,255,255,.18);color:#fff;border-color:rgba(255,255,255,.45);}
.tb-btn.danger:hover{background:rgba(200,30,30,.45);border-color:rgba(255,100,100,.4);color:#fff;}
.dark-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;flex-shrink:0;}
.dark-label{font-size:12px;color:rgba(255,255,255,.5);white-space:nowrap;}
.tog-track{width:32px;height:18px;border-radius:99px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.22);position:relative;transition:background .2s;flex-shrink:0;}
.tog-track.on{background:rgba(255,255,255,.32);border-color:rgba(255,255,255,.48);}
.tog-thumb{position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.6);transition:transform .2s;}
.tog-track.on .tog-thumb{transform:translateX(14px);background:#fff;}

/* ── Select bar ── */
.sel-bar{display:none;align-items:center;gap:8px;padding:9px 20px;justify-content:center;background:var(--blue-bg);border-bottom:1px solid var(--blue-border);}
.sel-bar.on{display:flex;}
.sel-bar-inner{display:flex;align-items:center;gap:8px;width:100%;max-width:620px;flex-wrap:wrap;}
.sel-label{font-size:13px;color:var(--blue-text);font-weight:500;flex:1;min-width:80px;}
.sab{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:4px 10px;border-radius:6px;border:1px solid var(--blue-border);background:var(--surface);color:var(--blue-text);cursor:pointer;white-space:nowrap;transition:background .12s;}
.sab:hover{background:var(--blue-bg);}
.sab.red{border-color:#F09595;color:#A32D2D;}
.sab.red:hover{background:#FCEBEB;}
body.dark .sab.red{border-color:#7f1d1d;color:#f87171;}
body.dark .sab.red:hover{background:#3d1a1a;}

/* ── Main ── */
.main{padding:20px 20px 60px;max-width:620px;margin:0 auto;}

/* ── Summary ── */
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.s-card{background:var(--surface);border:1px solid var(--border-light);border-radius:10px;padding:12px 14px;}
.s-label{font-size:11px;color:var(--text-faint);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.s-val{font-size:22px;font-weight:600;color:var(--text);line-height:1;}
.s-val.blue{color:var(--accent-done);}
.s-val.red{color:var(--accent-streak);}

/* ── Progress ── */
.progress-wrap{margin-bottom:16px;}
.progress-track{height:5px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:5px;}
.progress-fill{height:100%;background:var(--green-text);border-radius:99px;transition:width .35s cubic-bezier(.4,0,.2,1);}
.progress-label{font-size:11px;color:var(--text-faint);text-align:right;font-family:'DM Mono',monospace;}

/* ── Hidden notice ── */
.hidden-notice{font-size:12px;color:var(--text-faint);text-align:center;padding:6px 0 10px;}
.show-hid-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--blue-text);text-decoration:underline;font-family:'DM Sans',sans-serif;}

/* ── Task list ── */
.tasks{display:flex;flex-direction:column;gap:6px;}
.task-wrapper{display:flex;align-items:center;gap:10px;}

/* Normal task card */
.task-card{background:var(--surface);border:1px solid var(--border-light);border-radius:10px;overflow:hidden;flex:1;min-width:0;}
.task-card:hover{border-color:var(--border);}
.task-card.done-card{background:var(--green-bg);border-color:var(--green-border);}
.task-card.fail-card{background:#FDECEA;border-color:#F5A5A5;}
body.dark .task-card.fail-card{background:#2A1010;border-color:#7f1d1d;}
.task-card.hidden-card{opacity:.4;border-style:dashed;}
.task-card.sel-card{border-color:var(--blue-border);background:var(--blue-bg);}

.task-row{display:flex;align-items:center;gap:10px;padding:11px 14px;user-select:none;}
.task-card.hidden-card .task-row{cursor:default;}

/* Checkbox (select mode) */
.chk-col{display:none;align-items:center;flex-shrink:0;}
.chk-col.on{display:flex;}
.chk-col input{width:15px;height:15px;cursor:pointer;accent-color:var(--blue-text);}

/* ── 3-state toggle switch ── */
.tog-wrap{flex-shrink:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent;cursor:pointer;user-select:none;}
.tog-switch{width:72px;height:36px;border-radius:99px;background:var(--surface2);border:1.5px solid var(--border);position:relative;display:flex;align-items:center;justify-content:space-between;padding:0 8px;}
.tog-switch.state-pass{background:var(--green-text);border-color:var(--green-text);}
.tog-switch.state-fail{background:#D9534F;border-color:#D9534F;}
body.dark .tog-switch.state-fail{background:#E05555;border-color:#E05555;}
.tog-icon{font-size:13px;line-height:1;z-index:1;pointer-events:none;}
.tog-icon.x-icon{opacity:.4;}
.tog-icon.chk-icon{opacity:.4;}
.tog-switch.state-pass .tog-icon.chk-icon{opacity:1;}
.tog-switch.state-pass .tog-icon.x-icon{opacity:.5;}
.tog-switch.state-fail .tog-icon.x-icon{opacity:1;}
.tog-switch.state-fail .tog-icon.chk-icon{opacity:.5;}
.tog-thumb{position:absolute;width:26px;height:26px;border-radius:50%;background:#fff;top:50%;transform:translateY(-50%);left:3px;transition:left .18s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 4px rgba(0,0,0,.18);pointer-events:none;z-index:2;}
.tog-switch.state-pass .tog-thumb{left:calc(100% - 29px);}
.tog-switch.state-fail .tog-thumb{left:3px;}
.tog-switch.state-none .tog-thumb{left:calc(50% - 13px);}
/* Explicit tap zones covering each half */
.tog-half{position:absolute;top:0;bottom:0;width:50%;z-index:3;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.tog-left{left:0;border-radius:99px 0 0 99px;}
.tog-right{right:0;border-radius:0 99px 99px 0;}
.task-body{flex:1;min-width:0;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.task-name{font-size:16px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:1;}
.task-card.done-card .task-name{color:var(--green-text);}
.task-card.fail-card .task-name{color:#C0392B;}
body.dark .task-card.fail-card .task-name{color:#E05555;}
.task-target{font-size:12px;color:var(--text-faint);font-family:'DM Mono',monospace;white-space:nowrap;flex-shrink:0;text-align:right;}

.task-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.streak-badge{font-size:11px;font-family:'DM Mono',monospace;color:var(--amber-text);background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:99px;padding:2px 8px;white-space:nowrap;}
.pencil-btn{font-size:11px;padding:2px 7px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--text-faint);cursor:pointer;display:none;transition:color .1s;}
.task-card:hover .pencil-btn{display:inline-block;}
.pencil-btn:hover{color:var(--text-muted);}
.hid-badge{font-size:10px;font-family:'DM Mono',monospace;padding:1px 6px;border-radius:99px;background:var(--surface2);color:var(--text-faint);border:1px solid var(--border-light);}

/* Inline confirm bar */
.inline-bar{display:flex;align-items:center;gap:10px;padding:9px 14px;flex-wrap:wrap;}
.inline-bar.red-bar{background:var(--red-bg);border-top:1px solid var(--red-border);}
.inline-bar.edit-bar{background:var(--surface2);border-top:1px solid var(--border);}
.ibar-msg{flex:1;font-size:13px;color:#fff;font-weight:500;min-width:100px;}
.ib-yes{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:4px 13px;border-radius:6px;border:none;background:#fff;color:var(--red-bg);cursor:pointer;}
.ib-yes:hover{background:#ffe4e4;}
.ib-no{font-family:'DM Sans',sans-serif;font-size:12px;padding:4px 13px;border-radius:6px;border:1px solid rgba(255,255,255,.35);background:transparent;color:#fff;cursor:pointer;}
.ib-no:hover{background:rgba(255,255,255,.15);}

/* Inline edit bar */
.edit-bar{flex-direction:column;align-items:stretch;gap:8px;}
.edit-bar-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.e-input{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:5px 9px;border-radius:6px;border:1px solid var(--border);background:var(--surface3);color:var(--text);outline:none;transition:border-color .15s;}
.e-input:focus{border-color:var(--blue-border);}
.e-input.target{font-family:'DM Mono',monospace;font-size:11px;font-weight:400;flex:1;}
.e-name{flex:1;min-width:120px;}
.e-save{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:5px 11px;border-radius:6px;border:1px solid var(--blue-border);background:var(--blue-bg);color:var(--blue-text);cursor:pointer;}
.e-save:hover{opacity:.85;}
.e-cancel{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-faint);cursor:pointer;}
.e-cancel:hover{color:var(--text);}
.e-hide{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-faint);cursor:pointer;margin-left:auto;}
.e-hide:hover{color:var(--text);}
.e-del{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 11px;border-radius:6px;border:1px solid #FCA5A5;background:transparent;color:#991B1B;cursor:pointer;}
.e-del:hover{background:#FEE2E2;}
body.dark .e-del{border-color:#7f1d1d;color:#f87171;}
body.dark .e-del:hover{background:#3d1a1a;}

/* Drag reorder (edit mode row) */
.task-card.dragging{opacity:.35;}
.task-card.drag-over{border-color:var(--blue-border);}

/* Add button */
.add-wrap{margin-top:6px;display:none;}
.add-btn{width:100%;background:transparent;border:1px dashed var(--border-light);border-radius:10px;color:var(--text-faint);font-family:'DM Sans',sans-serif;font-size:13px;padding:12px;cursor:pointer;transition:all .15s;}
.add-btn:hover{background:var(--surface);color:var(--text-muted);border-color:var(--border);}

/* Reset confirm banner */
.banner{display:none;align-items:center;justify-content:center;padding:9px 20px;background:var(--red-bg);border-bottom:1px solid var(--red-border);}
.banner.on{display:flex;}
.banner-inner{display:flex;align-items:center;gap:10px;width:100%;max-width:620px;flex-wrap:wrap;}
.banner-msg{flex:1;font-size:13px;color:#fff;font-weight:500;}
.ban-yes{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:4px 14px;border-radius:6px;border:none;background:#fff;color:var(--red-bg);cursor:pointer;}
.ban-yes:hover{background:#ffe4e4;}
.ban-no{font-family:'DM Sans',sans-serif;font-size:12px;padding:4px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.35);background:transparent;color:#fff;cursor:pointer;}
.ban-no:hover{background:rgba(255,255,255,.15);}

.footer{margin-top:18px;text-align:center;font-size:11px;color:var(--text-faint);font-family:'DM Mono',monospace;}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="topbar-title">Daily Tasks <span>tracker</span></div>
    <input class="tb-search" id="search" type="text" placeholder="Search tasks…" oninput="render()">
    <div class="tb-gap"></div>
    <div class="date-nav">
      <button class="nav-btn" onclick="changeDay(-1)">‹</button>
      <div class="date-pill" id="date-label"></div>
      <button class="nav-btn" onclick="changeDay(1)">›</button>
    </div>
    <button class="tb-btn" id="sel-btn" onclick="toggleSelect()">Select</button>
    <button class="tb-btn" id="reset-btn" onclick="startReset()">Reset day</button>
    <button class="tb-btn" id="edit-btn" onclick="toggleEdit()">Edit</button>
    <div class="dark-toggle" onclick="toggleDark()">
      <span class="dark-label">Dark</span>
      <div class="tog-track" id="dark-track"><div class="tog-thumb"></div></div>
    </div>
  </div>
</div>

<!-- Reset confirm banner -->
<div class="banner" id="reset-banner">
  <div class="banner-inner">
    <div class="banner-msg">Reset all completions for this day?</div>
    <button class="ban-yes" onclick="confirmReset()">Yes, reset</button>
    <button class="ban-no" onclick="cancelReset()">Cancel</button>
  </div>
</div>

<!-- Select action bar -->
<div class="sel-bar" id="sel-bar">
  <div class="sel-bar-inner">
    <div class="sel-label" id="sel-label">0 selected</div>
    <button class="sab" onclick="selectAll()">Select all</button>
    <button class="sab" onclick="checkSelected()">Check off</button>
    <button class="sab" onclick="uncheckSelected()">Uncheck</button>
    <button class="sab" onclick="hideSelected()">Hide</button>
    <button class="sab red" onclick="deleteSelected()">Delete</button>
    <button class="sab" onclick="toggleSelect()">Cancel</button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="summary">
    <div class="s-card"><div class="s-label">Done</div><div class="s-val blue" id="stat-done">0</div></div>
    <div class="s-card"><div class="s-label">Left</div><div class="s-val" id="stat-rem">0</div></div>
    <div class="s-card"><div class="s-label">Streak 🔥</div><div class="s-val red" id="stat-streak">0d</div></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="progress-label" id="prog-label">0 / 0</div>
  </div>

  <div class="tasks" id="tasks"></div>
  <div id="hidden-notice"></div>
  <div class="add-wrap" id="add-wrap">
    <button class="add-btn" onclick="addTask()">＋ Add task</button>
  </div>
  <div class="footer" id="footer"></div>
</div>

<script>
const LS_KEY = 'daily-tasks-v5';
let offset = 0, selectMode = false, editMode = false, dragSrc = null;
let selected = new Set(), confirming = null, showHidden = false, editing = null;

const DEFAULT_TASKS = [
  {id:'steps',      name:'Steps',                 target:'10,000 steps'},
  {id:'pushups',    name:'Push-ups',              target:'100 reps'},
  {id:'situps',     name:'Sit-ups',               target:'100 reps'},
  {id:'squats',     name:'Squats',                target:'50 reps'},
  {id:'meditate',   name:'Meditate',              target:'10 mins'},
  {id:'water',      name:'Water',                 target:'1 gallon'},
  {id:'caloric',    name:'Caloric deficit',       target:'stay in deficit'},
  {id:'spending',   name:'No spending',           target:'zero spend day'},
  {id:'write',      name:'Write',                 target:'at least once'},
  {id:'watch',      name:'Watch',                 target:'at least once'},
  {id:'read',       name:'Read',                  target:'at least once'},
  {id:'learn',      name:'Learn something',       target:'new knowledge'},
  {id:'teeth_morn', name:'Brush teeth (morning)', target:'2 mins'},
  {id:'teeth_night',name:'Brush teeth (night)',   target:'2 mins'},
  {id:'no_sh',      name:'No SH',                 target:'complete'},
  {id:'under3x',    name:'Under 3X',              target:'complete'},
];

function load(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'{}');}catch{return {};}}
function save(d){localStorage.setItem(LS_KEY,JSON.stringify(d));}
function getData(){const d=load();if(!d.tasks)d.tasks=JSON.parse(JSON.stringify(DEFAULT_TASKS));if(!d.days)d.days={};if(!d.hidden)d.hidden=[];return d;}

function todayKey(){return new Date().toISOString().slice(0,10);}
function keyFromOffset(off){const d=new Date();d.setDate(d.getDate()+off);return d.toISOString().slice(0,10);}

// Store current view as an absolute date string, not a relative offset
let currentKey = todayKey();

function dateKey(off){ 
  // off is only used for streak calculations — always relative to today
  const d=new Date();d.setDate(d.getDate()+off);return d.toISOString().slice(0,10);
}
function friendlyDate(key){
  const d=new Date(key+'T00:00:00');
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function getDay(data,key){if(!data.days[key])data.days[key]={};return data.days[key];}
function getStreak(data,id){let s=0;for(let i=-1;i>=-365;i--){if(data.days[dateKey(i)]&&data.days[dateKey(i)][id]==='pass')s++;else break;}return s;}
function getFullStreak(data){let s=0;for(let i=-1;i>=-365;i--){const vis=data.tasks.filter(t=>!(data.hidden||[]).includes(t.id));const dk=dateKey(i);if(vis.every(t=>data.days[dk]&&data.days[dk][t.id]==='pass'))s++;else break;}return s;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function changeDay(dir){
  const d=new Date(currentKey+'T00:00:00');
  d.setDate(d.getDate()+dir);
  currentKey=d.toISOString().slice(0,10);
  render();
}
function toggleDark(){const on=document.body.classList.toggle('dark');document.getElementById('dark-track').classList.toggle('on',on);localStorage.setItem('dt-dark',on?'1':'0');}

/* Select mode */
function toggleSelect(){
  selectMode=!selectMode;selected.clear();
  if(selectMode){editMode=false;document.getElementById('edit-btn').classList.remove('active');document.getElementById('add-wrap').style.display='none';editing=null;}
  document.getElementById('sel-btn').classList.toggle('active',selectMode);
  document.getElementById('sel-bar').classList.toggle('on',selectMode);
  render();
}
function selectAll(){const data=getData();data.tasks.forEach(t=>selected.add(t.id));render();}
function checkSelected(){const data=getData();if(!data.days[currentKey])data.days[currentKey]={};selected.forEach(id=>{data.days[currentKey][id]='pass';});save(data);selected.clear();render();}
function uncheckSelected(){const data=getData();if(!data.days[currentKey])data.days[currentKey]={};selected.forEach(id=>{data.days[currentKey][id]=null;});save(data);selected.clear();render();}
function hideSelected(){const data=getData();selected.forEach(id=>{if(!(data.hidden||[]).includes(id))data.hidden.push(id);});save(data);selected.clear();render();}
function deleteSelected(){if(!selected.size)return;const data=getData();data.tasks=data.tasks.filter(t=>!selected.has(t.id));save(data);selected.clear();render();}
function updateSelLabel(){document.getElementById('sel-label').textContent=selected.size+' selected';}

/* Edit mode */
function toggleEdit(){
  editMode=!editMode;editing=null;
  if(editMode){selectMode=false;selected.clear();document.getElementById('sel-btn').classList.remove('active');document.getElementById('sel-bar').classList.remove('on');}
  document.getElementById('edit-btn').classList.toggle('active',editMode);
  document.getElementById('add-wrap').style.display=editMode?'block':'none';
  render();
}
function startInlineEdit(id){editing=id;confirming=null;render();}
function cancelEdit(){editing=null;confirming=null;render();}
function saveEdit(id){
  const data=getData();const t=data.tasks.find(t=>t.id===id);
  if(!t)return;
  const n=document.getElementById('ei-name-'+id);const tg=document.getElementById('ei-target-'+id);
  if(n)t.name=n.value;if(tg)t.target=tg.value;
  save(data);editing=null;render();
}
function hideTask(id){const data=getData();if(!(data.hidden||[]).includes(id))data.hidden.push(id);save(data);editing=null;render();}
function unhideTask(id){const data=getData();data.hidden=(data.hidden||[]).filter(h=>h!==id);save(data);editing=null;render();}
function startDelete(id){confirming=id;render();}
function confirmDelete(id){const data=getData();data.tasks=data.tasks.filter(t=>t.id!==id);save(data);confirming=null;editing=null;render();}

function addTask(){
  const data=getData();const id='task_'+Date.now();
  data.tasks.push({id,name:'New task',target:'target'});
  save(data);editing=id;render();
  setTimeout(()=>{const el=document.getElementById('ei-name-'+id);if(el){el.focus();el.select();}},30);
}

/* Reset */
function startReset(){document.getElementById('reset-banner').classList.add('on');}
function cancelReset(){document.getElementById('reset-banner').classList.remove('on');}
function confirmReset(){const data=getData();data.days[currentKey]={};save(data);cancelReset();render();}

/* Debounce to prevent touch+click double-fire */
let _lastToggle=0;
window.toggle=function(id){
  const now=Date.now();if(now-_lastToggle<500)return;_lastToggle=now;
  if(selectMode){if(selected.has(id))selected.delete(id);else selected.add(id);updateSelLabel();render();return;}
  const data=getData();
  if(!data.days[currentKey])data.days[currentKey]={};
  const cur=data.days[currentKey][id];
  data.days[currentKey][id]=cur==='pass'?null:'pass';
  save(data);render();
};
window.toggleFail=function(id){
  const now=Date.now();if(now-_lastToggle<500)return;_lastToggle=now;
  const data=getData();
  if(!data.days[currentKey])data.days[currentKey]={};
  const cur=data.days[currentKey][id];
  data.days[currentKey][id]=cur==='fail'?null:'fail';
  save(data);render();
};

function render(){
  const data=getData();
  const day=getDay(data,currentKey);
  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  const hidden=data.hidden||[];
  const visTasks=data.tasks.filter(t=>!hidden.includes(t.id));
  const done=visTasks.filter(t=>day[t.id]==='pass').length;
  const total=visTasks.length;
  const pct=total?Math.round((done/total)*100):0;

  document.getElementById('date-label').textContent=friendlyDate(currentKey);
  document.getElementById('stat-done').textContent=done;
  document.getElementById('stat-rem').textContent=total-done;
  document.getElementById('stat-streak').textContent=getFullStreak(data)+'d';
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent=done+' / '+total;
  document.getElementById('footer').textContent='saved locally · '+currentKey;

  const container=document.getElementById('tasks');
  container.innerHTML='';

  const hiddenTasks=data.tasks.filter(t=>hidden.includes(t.id));

  data.tasks.forEach(task=>{
    const isHidden=hidden.includes(task.id);
    if(isHidden&&!showHidden)return;
    if(q&&!task.name.toLowerCase().includes(q)&&!task.target.toLowerCase().includes(q))return;

    const state=day[task.id]||null; // 'pass', 'fail', or null
    const isDone=state==='pass';
    const isFail=state==='fail';
    const streak=getStreak(data,task.id);
    const isSel=selected.has(task.id);
    const isEditing=editing===task.id;
    const isConfirming=confirming===task.id;

    const stateClass = isDone ? 'state-pass' : isFail ? 'state-fail' : 'state-none';

    /* Outer wrapper: toggle + card side by side */
    const wrapper=document.createElement('div');
    wrapper.className='task-wrapper';

    /* Toggle switch — completely outside the card */
    if(!selectMode){
      const togWrap=document.createElement('div');
      togWrap.className='tog-wrap';
      togWrap.innerHTML=`
        <div class="tog-switch ${stateClass}">
          <div class="tog-half tog-left"></div>
          <span class="tog-icon x-icon">✕</span>
          <div class="tog-thumb"></div>
          <span class="tog-icon chk-icon">✓</span>
          <div class="tog-half tog-right"></div>
        </div>`;

      togWrap.querySelector('.tog-left').addEventListener('click',function(e){
        e.stopPropagation();
        const d=getData();if(!d.days[currentKey])d.days[currentKey]={};
        d.days[currentKey][task.id]=d.days[currentKey][task.id]==='fail'?null:'fail';
        save(d);render();
      });
      togWrap.querySelector('.tog-right').addEventListener('click',function(e){
        e.stopPropagation();
        const d=getData();if(!d.days[currentKey])d.days[currentKey]={};
        d.days[currentKey][task.id]=d.days[currentKey][task.id]==='pass'?null:'pass';
        save(d);render();
      });
      wrapper.appendChild(togWrap);
    }

    const card=document.createElement('div');
    let cls='task-card';
    if(isDone&&!isHidden)cls+=' done-card';
    if(isFail&&!isHidden)cls+=' fail-card';
    if(isHidden)cls+=' hidden-card';
    if(isSel)cls+=' sel-card';
    card.className=cls;

    if(editMode){
      card.draggable=true;
      card.addEventListener('dragstart',e=>{dragSrc=task.id;e.dataTransfer.effectAllowed='move';setTimeout(()=>card.classList.add('dragging'),0);});
      card.addEventListener('dragend',()=>{document.querySelectorAll('.task-card').forEach(x=>x.classList.remove('dragging','drag-over'));dragSrc=null;});
      card.addEventListener('dragover',e=>{e.preventDefault();document.querySelectorAll('.task-card').forEach(x=>x.classList.remove('drag-over'));if(task.id!==dragSrc)card.classList.add('drag-over');});
      card.addEventListener('drop',e=>{
        e.preventDefault();if(!dragSrc||dragSrc===task.id)return;
        const d=getData();const from=d.tasks.findIndex(t=>t.id===dragSrc);const to=d.tasks.findIndex(t=>t.id===task.id);
        const [item]=d.tasks.splice(from,1);d.tasks.splice(to,0,item);save(d);render();
      });
    }

    /* Main row */
    const row=document.createElement('div');row.className='task-row';
    if(selectMode)row.onclick=()=>toggle(task.id);

    /* Select checkbox */
    const chkCol=document.createElement('div');chkCol.className='chk-col'+(selectMode?' on':'');
    const chk=document.createElement('input');chk.type='checkbox';chk.checked=isSel;
    chk.onclick=e=>{e.stopPropagation();toggle(task.id);};
    chkCol.appendChild(chk);row.appendChild(chkCol);

    /* Body */
    const SHOW_TARGET=['steps','pushups','situps','squats','meditate','water'];
    const body=document.createElement('div');body.className='task-body';
    body.innerHTML=`<div class="task-name">${esc(task.name)}</div>${SHOW_TARGET.includes(task.id)?`<div class="task-target">${esc(task.target)}</div>`:''}`;
    row.appendChild(body);

    /* Right side */
    const right=document.createElement('div');right.className='task-right';
    if(isHidden){right.innerHTML+=`<span class="hid-badge">hidden</span>`;}
    if(streak>0&&!isHidden){right.innerHTML+=`<span class="streak-badge">🔥 ${streak}d</span>`;}
    if(!selectMode){
      const pencil=document.createElement('button');pencil.className='pencil-btn';pencil.textContent='edit';
      pencil.onclick=e=>{e.stopPropagation();startInlineEdit(task.id);};
      right.appendChild(pencil);
    }
    row.appendChild(right);
    card.appendChild(row);

    /* Inline edit bar */
    if(isEditing){
      const bar=document.createElement('div');bar.className='inline-bar edit-bar';
      const row1=document.createElement('div');row1.className='edit-bar-row';
      row1.innerHTML=`<input class="e-input e-name" id="ei-name-${task.id}" value="${esc(task.name)}" placeholder="Task name"><button class="e-save" onclick="saveEdit('${task.id}')">Save</button><button class="e-cancel" onclick="cancelEdit()">Cancel</button><button class="e-hide" onclick="${isHidden?'unhideTask':'hideTask'}('${task.id}')">${isHidden?'Unhide':'Hide'}</button><button class="e-del" onclick="startDelete('${task.id}')">Delete</button>`;
      const row2=document.createElement('div');row2.className='edit-bar-row';
      row2.innerHTML=`<input class="e-input e-input target" id="ei-target-${task.id}" value="${esc(task.target)}" placeholder="Target / description">`;
      bar.appendChild(row1);bar.appendChild(row2);card.appendChild(bar);
    }

    /* Inline delete confirm */
    if(isConfirming){
      const bar=document.createElement('div');bar.className='inline-bar red-bar';
      bar.innerHTML=`<span class="ibar-msg">Delete "${esc(task.name)}"?</span><button class="ib-yes" onclick="confirmDelete('${task.id}')">Yes, delete</button><button class="ib-no" onclick="cancelEdit()">Cancel</button>`;
      card.appendChild(bar);
    }

    wrapper.appendChild(card);
    container.appendChild(wrapper);
  });

  /* Hidden notice */
  const notice=document.getElementById('hidden-notice');
  if(hiddenTasks.length>0){
    notice.innerHTML=`<p class="hidden-notice">${hiddenTasks.length} hidden task${hiddenTasks.length>1?'s':''}. <button class="show-hid-btn" onclick="toggleShowHidden()">${showHidden?'Hide them':'Show them'}</button></p>`;
  } else {notice.innerHTML='';}
}

function toggleShowHidden(){showHidden=!showHidden;render();}

/* Init */
if(localStorage.getItem('dt-dark')==='1'){document.body.classList.add('dark');document.getElementById('dark-track').classList.add('on');}
render();

/* Auto-advance at midnight */
function scheduleMidnight(){
  const now=new Date();
  const midnight=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,0,0);
  const ms=midnight-now;
  setTimeout(function(){
    // Only auto-advance if user is viewing today
    if(currentKey===todayKey()){
      currentKey=todayKey();
      render();
    }
    scheduleMidnight();
  }, ms);
}
scheduleMidnight();

if('serviceWorker' in navigator){
  // Unregister any old service workers so cached files don't block updates
  navigator.serviceWorker.getRegistrations().then(function(regs){
    regs.forEach(function(r){ r.unregister(); });
  });
}
</script>
</body>
</html>
